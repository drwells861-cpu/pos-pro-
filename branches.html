<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-6 h-fit"><h3 class="text-lg font-black text-slate-900 mb-5 flex items-center gap-2"><i class="fa-solid fa-code-branch text-blue-500"></i> إعدادات الفروع</h3><form id="branch-form" onsubmit="window.submitBranch(); return false;" class="space-y-4"><div><label class="block text-xs font-bold mb-1.5">الكود</label><input type="text" id="branch-code" required class="w-full px-4 py-2 border rounded-xl font-mono"></div><div><label class="block text-xs font-bold mb-1.5">الاسم</label><input type="text" id="branch-name" required class="w-full px-4 py-2 border rounded-xl"></div><div><label class="block text-xs font-bold mb-1.5">باسورد الفرع</label><input type="password" id="branch-password" required class="w-full px-4 py-2 border rounded-xl"></div><div><label class="block text-xs font-bold mb-1.5">النوع</label><select id="branch-type" class="w-full px-4 py-2 border rounded-xl font-bold"><option value="BRANCH">فرع تشغيلي</option><option value="CUSTOMER_SERVICE">خدمة عملاء</option></select></div><div class="flex gap-2"><button type="submit" class="flex-1 bg-blue-600 text-white font-bold py-2.5 rounded-xl text-sm">حفظ</button><button type="button" onclick="window.resetBranchForm()" class="bg-slate-100 text-slate-600 py-2.5 px-4 rounded-xl text-sm font-bold">إلغاء</button></div></form></div>
