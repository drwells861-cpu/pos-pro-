<div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-6 sm:p-8 relative"> 
    <button id="btn-cancel-edit" onclick="window.cancelEditFlow()" class="absolute left-6 top-6 bg-red-50 hover:bg-red-100 text-red-600 text-xs font-bold py-2 px-4 rounded-xl hidden transition-colors shadow-sm border border-red-100 flex items-center gap-2 active:scale-95 z-10"><i class="fa-solid fa-xmark"></i> التراجع عن التعديل</button>
    <h3 class="text-xl font-black text-slate-900 mb-6 flex items-center gap-3 border-b border-slate-100 pb-4"><div class="p-2.5 bg-indigo-50 text-indigo-600 rounded-xl"><i class="fa-solid fa-cart-arrow-down"></i></div>توجيه وبيانات الطلب</h3>
    
    <div class="grid grid-cols-1 md:grid-cols-5 gap-5 mb-6 pb-6 border-b border-slate-100">
        <div><label class="block text-xs font-black text-slate-800 mb-2">فرع التنفيذ *</label><select id="invoice-target-branch" class="w-full px-4 py-2.5 border-2 border-indigo-100 rounded-xl bg-indigo-50/50 font-bold outline-none"></select></div>
        <div><label class="block text-xs font-bold mb-2">فئة الفاتورة *</label><select id="inv-type-select" class="w-full px-4 py-2.5 border rounded-xl bg-slate-50 font-bold outline-none"></select></div>
        <div><label class="block text-xs font-bold mb-2">نوع الأوردر *</label><select id="ord-type-select" class="w-full px-4 py-2.5 border rounded-xl bg-slate-50 font-bold outline-none"></select></div>
        <div><label class="block text-xs font-bold mb-2">طريقة الدفع *</label><select id="pay-type-select" class="w-full px-4 py-2.5 border border-emerald-200 rounded-xl bg-emerald-50 font-bold text-emerald-800 outline-none"></select></div>
        <div><label class="block text-xs font-bold mb-2">رقم يدوي *</label><input type="text" id="inv-manual-no" class="w-full px-4 py-2.5 border border-red-200 rounded-xl font-mono font-black text-center text-red-600 bg-red-50 outline-none" placeholder="00000"></div>
    </div>
    
    <div class="space-y-5">
        <div class="flex flex-wrap gap-5">
            <div class="flex-[2]"><label class="block text-xs font-bold mb-2">اسم العميل</label><input type="text" id="cust-name" class="w-full px-4 py-2.5 border rounded-xl font-semibold text-sm outline-none"></div>
            <div class="flex-[1]"><label class="block text-xs font-bold mb-2">الموبايل</label><input type="text" id="cust-phone" class="w-full px-4 py-2.5 border rounded-xl font-mono font-bold text-sm outline-none"></div>
        </div>
        <div class="flex flex-wrap gap-5">
            <div class="flex-[2]"><label class="block text-xs font-bold mb-2">العنوان التفصيلي</label><input type="text" id="cust-address" class="w-full px-4 py-2.5 border rounded-xl text-sm outline-none"></div>
            <div class="flex-[1]"><label class="block text-xs font-bold mb-2">موقع GPS</label><input type="url" id="cust-location" class="w-full px-4 py-2.5 border rounded-xl text-sm outline-none"></div>
        </div>
        <div><label class="block text-xs font-bold mb-2">ملاحظات</label><input type="text" id="cust-notes" class="w-full px-4 py-2.5 border border-amber-200 rounded-xl bg-amber-50/30 text-sm font-semibold outline-none text-amber-900"></div>
    </div>
</div>

<div class="bg-indigo-900 rounded-2xl p-4 shadow-lg sticky top-[72px] z-30 mt-6 border border-indigo-800">
    <div class="flex flex-wrap md:flex-nowrap items-end gap-3">
        <div class="w-full md:w-1/4"><label class="block text-xs font-bold text-indigo-200 mb-1.5 flex justify-between"><span>الكود</span><span class="text-[10px] bg-indigo-950 px-2 rounded">F1 بحث</span></label><div class="flex"><input type="text" id="inv-item-code" onkeydown="window.handleItemInputKey(event)" class="w-full px-4 py-3 border-0 rounded-r-xl bg-indigo-950 text-white font-mono font-bold outline-none" placeholder="باركود..."><button onclick="window.openSearchModal()" class="bg-indigo-600 text-white px-5 rounded-l-xl border-l border-y border-indigo-600"><i class="fa-solid fa-search"></i></button></div></div>
        <div class="flex-1"><label class="block text-xs font-bold text-indigo-200 mb-1.5">البيان</label><input type="text" id="inv-item-name" readonly class="w-full px-4 py-3 bg-indigo-950/50 border-0 rounded-xl text-indigo-300 font-semibold outline-none cursor-not-allowed"></div>
        <div class="w-28"><label class="block text-xs font-bold text-indigo-200 mb-1.5">السعر</label><input type="number" step="0.01" id="inv-item-price" onkeydown="window.handlePriceInputKey(event)" class="w-full px-4 py-3 border-0 rounded-xl font-black text-indigo-900 bg-indigo-50 text-center outline-none"></div>
        <div class="w-24"><label class="block text-xs font-bold text-indigo-200 mb-1.5">الكمية</label><input type="number" id="inv-item-qty" onkeydown="window.handleQtyInputKey(event)" value="1" min="1" class="w-full px-4 py-3 border-0 rounded-xl text-center font-black bg-white outline-none"></div>
        <button onclick="window.addItemToInvoiceList()" class="bg-emerald-500 hover:bg-emerald-400 text-white font-black py-3 px-8 rounded-xl active:scale-95">إدراج</button>
    </div>
</div>

<div class="bg-white rounded-2xl shadow-soft border border-slate-200 overflow-hidden flex flex-col min-h-[300px] mt-6">
    <div class="flex-1 overflow-x-auto custom-scrollbar"><table class="w-full text-right border-collapse"><thead class="bg-slate-50 text-xs font-black text-slate-500 border-b uppercase"><th class="p-4">الكود</th><th class="p-4 w-1/3">البيان</th><th class="p-4">أساسي</th><th class="p-4 w-32">بيع</th><th class="p-4 w-28 text-center">كمية</th><th class="p-4">إجمالي</th><th class="p-4 text-center">حذف</th></thead><tbody id="current-invoice-items" class="text-sm divide-y"></tbody></table></div>
    <div class="bg-slate-50 border-t"><div class="grid grid-cols-2 md:grid-cols-4 gap-0 divide-x divide-x-reverse"><div class="p-4 text-center"><span class="block text-xs font-bold text-slate-500 mb-1">أصناف</span><span id="tot-distinct-items" class="text-2xl font-black text-slate-800">0</span></div><div class="p-4 text-center"><span class="block text-xs font-bold text-slate-500 mb-1">قطع</span><span id="tot-pieces" class="text-2xl font-black text-slate-800">0</span></div><div class="p-4 text-center bg-red-50/50"><span class="block text-xs font-bold text-red-400 mb-1">فرق السعر</span><span id="tot-price-diff" class="text-xl font-black text-red-600">0.00</span></div><div class="p-4 text-center bg-indigo-600"><span class="block text-xs font-bold text-indigo-200 mb-1">الإجمالي المطلوب</span><span id="tot-invoice-amount" class="text-3xl font-black text-white">0.00</span></div></div></div>
    <div class="p-4 sm:p-6 bg-white border-t flex justify-end"><button id="btn-suspend-invoice" onclick="window.processInvoiceWithVerification()" class="bg-amber-500 hover:bg-amber-400 text-white font-black py-4 px-10 rounded-xl active:scale-95 text-lg"><i class="fa-solid fa-paper-plane text-xl ml-2"></i>إرسال وتعليق الطلب (F10)</button></div>
</div>
