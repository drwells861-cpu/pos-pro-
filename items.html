 <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-6 h-fit"><h3 class="text-lg font-black text-slate-900 mb-5 flex items-center gap-2"><i class="fa-solid fa-plus-circle text-indigo-500"></i> تسجيل صنف</h3><form id="item-form" onsubmit="window.submitItem(); return false;" class="space-y-4"><div><label class="block text-xs font-bold mb-1.5">كود الصنف</label><input type="text" id="item-code" required class="w-full px-4 py-2 border rounded-xl font-mono bg-slate-50"></div><div><label class="block text-xs font-bold mb-1.5">الاسم</label><input type="text" id="item-name" required class="w-full px-4 py-2 border rounded-xl bg-slate-50"></div><div><label class="block text-xs font-bold mb-1.5">السعر</label><input type="number" step="0.01" id="item-price" required class="w-full px-4 py-2 border rounded-xl bg-slate-50 font-bold text-indigo-600"></div><div class="flex gap-2 pt-3"><button type="submit" class="flex-1 bg-indigo-600 text-white font-bold py-2.5 rounded-xl text-sm">حفظ</button><button type="button" onclick="window.resetItemForm()" class="bg-slate-100 text-slate-600 py-2.5 px-4 rounded-xl text-sm font-bold">إلغاء</button></div></form></div>
    <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-6 lg:col-span-2 flex flex-col justify-between"><div><h3 class="text-lg font-black text-slate-900 mb-2 flex items-center gap-2"><i class="fa-solid fa-file-excel text-emerald-500"></i> استيراد Excel</h3><p class="text-xs font-semibold text-slate-500 mb-5">ترتيب الأعمدة: (الكود، الاسم، السعر).</p><div class="border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center relative hover:bg-slate-50"><input type="file" id="excel-file" accept=".xlsx, .xls" onchange="window.handleExcelUpload(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"><i class="fa-solid fa-cloud-arrow-up text-5xl text-slate-300 mb-3"></i><p class="text-sm font-bold text-slate-600">ارفع ملف الـ Excel هنا</p></div></div></div>
</div>
<div class="bg-white rounded-2xl shadow-soft border border-slate-200 overflow-hidden mt-6"><div class="p-4 border-b bg-slate-50/50 flex justify-between"><h3 class="font-black text-lg">سجل الأصناف</h3><input type="text" id="search-items" oninput="window.currentItemsPage = 1; window.renderItemsTable()" class="w-72 px-4 py-2 border rounded-xl text-sm outline-none" placeholder="بحث باسم أو كود..."></div><div class="overflow-x-auto"><table class="w-full text-right border-collapse"><thead class="bg-slate-50 text-xs font-black text-slate-500 border-b"><th class="p-4">الكود</th><th class="p-4">الاسم</th><th class="p-4">السعر</th><th class="p-4 text-center">أدوات</th></thead><tbody id="items-table-body" class="text-sm divide-y"></tbody></table></div><div class="p-4 border-t bg-slate-50/50 flex justify-between items-center"><span id="items-page-info" class="text-xs font-bold text-slate-500 bg-white px-3 py-1.5 rounded-lg border">صفحة 1</span><div class="flex gap-2"><button type="button" onclick="window.prevItemPage()" class="bg-white border hover:bg-slate-50 px-5 py-2 rounded-xl text-xs font-bold">السابق</button><button type="button" onclick="window.nextItemPage()" class="bg-slate-800 text-white px-5 py-2 rounded-xl text-xs font-bold">التالي</button></div></div></div>
